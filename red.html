    <link rel="stylesheet" href="CSS/style.css?v=1.1">
    
    <style>
        /* Regola essenziale per i link dentro la about-list */
        .about-list a {
            color: inherit; /* Mantiene il grigio --text-muted */
            text-decoration: none; /* Toglie la sottolineatura di default */
            display: inline-block; /* Permette il transform senza rompere il layout */
            transition: color 0.2s ease, transform 0.2s ease;
        }

        /* Feedback visivo deciso al passaggio del mouse */
        .about-list a:hover {
            color: var(--accent-color);
            transform: translateX(5px); /* Piccolo scatto in avanti, coerente con la sidebar */
        }
    </style>
</head>

                </li>

                    </a>
                </li>
            </ul>
        </header>
